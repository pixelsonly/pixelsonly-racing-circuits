name: Release

# SemVer releases via release-please (Conventional Commits) + publish to GitHub Packages.
#
# How it works:
#   1. On every push to main, release-please maintains a "release PR" that accrues
#      changes and computes the next SemVer version from commit prefixes:
#         feat:            -> minor (new track / additive optional field)
#         fix: / data:     -> patch (value correction, typo)
#         feat!: or a "BREAKING CHANGE:" footer -> major (schema break, track removal,
#                          field removal/rename/retype, optional->required)
#      See the "Versioning" section of the README for the full policy.
#   2. When you MERGE that release PR, release-please tags the release, writes the
#      CHANGELOG, and sets release_created=true.
#   3. The publish job then builds (YAML -> JSON) and publishes @pixelsonly/pixelsonly-racing-circuits
#      to GitHub Packages.
#
# So releases are deliberate (one per merged release PR), not one-per-merge — which
# is what SemVer requires.
#
# Note: we use a PAT (secrets.RELEASE_PLEASE_TOKEN) rather than the default
# GITHUB_TOKEN so the release PR it opens DOES trigger other workflows — in
# particular the required `pr-title` lint, which would otherwise sit pending forever
# on the bot's PR and block the merge. (GITHUB_TOKEN-authored events don't trigger
# workflow runs, by design.) The PAT needs contents:write + pull-requests:write.
# The publish job below keeps using GITHUB_TOKEN — that's all it needs.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the data bundle as a release asset
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://npm.pkg.github.com/"
          scope: "@pixelsonly"
      - run: npm ci
      - run: npm run build

      # Attach a versioned, language-agnostic data bundle to the GitHub Release so
      # non-npm consumers can fetch + checksum-verify the built data without a Node
      # toolchain. build/ is gitignored, so this asset — not git — is the durable
      # artifact. Done before npm publish so the release still carries the data even
      # if the registry push hiccups.
      - name: Package data bundle
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG#v}"
          cp schema/circuit.schema.json build/   # ship the schema alongside the data
          tar -czf "circuits-${VERSION}.tar.gz" -C build .
          shasum -a 256 "circuits-${VERSION}.tar.gz" > SHA256SUMS
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          VERSION="${TAG#v}"
          gh release upload "$TAG" "circuits-${VERSION}.tar.gz" SHA256SUMS --clobber

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
