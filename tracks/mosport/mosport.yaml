      url: https://en.wikipedia.org/wiki/Canadian_Tire_Motorsport_Park
      accessed: 2026-06-11
  - class: Formula One
    time: "1:13.299"
    driver: Mario Andretti
    car: Lotus 78
    year: 1977
    record_type: race
    sources:
