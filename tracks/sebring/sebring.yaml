editorial:
  tagline: >-
    A WWII bomber base turned 17-turn endurance proving ground: Sebring's abrasive, seam-ridden runway concrete has tortured sports cars in the 12 Hours since 1950, all the way to the signature bumps of Turn 17.
  narrative_md: sebring.md
  available_in:
  - iRacing
  - Le Mans Ultimate
  - Forza Motorsport

