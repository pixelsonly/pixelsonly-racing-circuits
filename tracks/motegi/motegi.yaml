editorial:
  tagline: >-
    Honda's stop-and-go test in the Tochigi hills: 4.8 km of heavy braking zones, tight hairpins and a tunnel under the oval, where Victory Corner has the last word in MotoGP, Super GT and Super Formula.
  narrative_md: motegi.md
  available_in:
  - iRacing
  - MotoGP 24

