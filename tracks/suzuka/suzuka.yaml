      url: https://en.wikipedia.org/wiki/Suzuka_Circuit
      accessed: 2026-06-11

editorial:
  tagline: >-
    Formula 1's only figure-8: 5.807 km of John Hugenholtz's 1962 masterpiece near Suzuka, where the back straight crosses over the front and the uphill Esses, the Spoon and the flat-out 130R define a driver's circuit like no other.
  narrative_md: suzuka.md
  available_in:
