editorial:
  tagline: >-
    The World Center of Racing: a 3.56-mile road course that threads a tight infield through Daytona's 31-degree superspeedway banking, home of the Rolex 24, America's round-the-clock endurance classic.
  narrative_md: daytona.md
  available_in:
  - iRacing
  - Gran Turismo 7
  - Automobilista 2
  - rFactor 2
  - Forza Motorsport

