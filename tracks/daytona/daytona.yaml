      url: https://en.wikipedia.org/wiki/Daytona_International_Speedway
      accessed: 2026-06-10
    - title: Cadillac DPi-V.R posts podium finish in 60th Rolex 24 At Daytona — SpeedwayMedia
      url: https://speedwaymedia.com/2022/01/30/cadillac-dpi-v-r-posts-podium-finish-in-60th-rolex-24-at-daytona/
