# Circuit Record — validates against ../../schema/circuit.schema.json
# Authoring notes for contributors:
#   - Every fact should be traceable to an entry in `sources` (or a corner/lap_records
#     `sources` block). Use YAML comments to flag anything still needing a second source.
#   - Persist BOTH metric and imperial. The display unit per surface is a styling choice.
#   - `slug` must match this folder's name and never changes once published.

slug: spa
name: Circuit de Spa-Francorchamps
display_name: Spa-Francorchamps
subtitle: Circuit
country_code: BE
country_name: Belgium
locality: Stavelot, Wallonia, Belgium
latitude: 50.4372 # circuit center — 50°26′14″N per Wikipedia
longitude: 5.9714 # 5°58′17″E per Wikipedia
year_opened: 1921

primary_layout: grand-prix

layouts:
- id: grand-prix
  name: Grand Prix
  current: true
  years: 2007-present # current 7.004 km configuration; the layout has been progressively shortened from the original 14 km road course
  direction: clockwise
  turns: 19
  length_km: 7.004
  length_mi: 4.352
  elevation_change_m: 102
  elevation_change_ft: 335
  map_svg: map.svg
  corners:
  - id: la-source
    number: "1"
    name: La Source
    description: >-
      A tight, slow right-hand hairpin at the end of the start-finish straight, taken in first or second gear. The opening corner of the lap and a frequent first-lap flashpoint.
    direction: right
    apex_type: late
    landmark: >-
      Brake at the 100 m board past the pit exit; the corner tightens through the apex so a geometric line will run wide onto the kerb.
    coaching: >-
      Resist the urge to dive — La Source rewards a late apex that opens the exit onto the long downhill toward Eau Rouge, where small exit losses compound across the entire run to Les Combes. Patience here is paid back twice on the next straight.
    position: { x: 0.235, y: 0.732 } # source marker T1 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Circuit de Spa-Francorchamps — Wikipedia
      url: https://en.wikipedia.org/wiki/Circuit_de_Spa-Francorchamps
      accessed: 2026-05-28
  - id: eau-rouge-raidillon
    number: "2-4"
    name: Eau Rouge / Raidillon
    signature: true
    description: >-
      A downhill left-hand kink (Eau Rouge) across the bridge over the Eau Rouge stream that flicks immediately into a steeply rising right-left-right (Raidillon) climbing roughly 40 m (130 ft) and cresting blind. Taken flat in top gear in a modern F1 car at over 300 km/h (186 mph).
    story: |
      The most famous corner sequence in motorsport. The compression at the
      base loads the car to roughly 4 g, and the crest hides the next apex
      until the car is already committed — a test of nerve as much as of
      machinery. The 2022 redevelopment expanded run-off here after a series
      of high-speed incidents through the 2010s and early 2020s.
    direction: left-right
    apex_type: double
    elevation_change_m: 40
    elevation_change_ft: 130
    landmark: >-
      Aim for the right-hand kerb at the base of the climb; the second apex (Raidillon) is over the crest and cannot be seen until the car has already turned in.
    coaching: >-
      Commit fully or not at all — a mid-corner lift unsettles the rear at the worst possible moment, when the compression is highest and the car is on the steepest part of the climb. The line is a long, single arc through the complex, not three discrete turn-ins. Trust the load.
    position: { x: 0.164, y: 0.448 } # source marker T3 / Raidillon (scripts/derive-corner-positions.mjs)
    sources:
    - title: Circuit de Spa-Francorchamps — Wikipedia
      url: https://en.wikipedia.org/wiki/Circuit_de_Spa-Francorchamps
      accessed: 2026-05-28
  - id: les-combes
    number: "5-6"
    name: Les Combes
    description: >-
      A right-left chicane at the end of the Kemmel straight, entered under heavy braking from top speed; the primary overtaking zone of the lap.
    direction: right-left
    position: { x: 0.248, y: 0.382 } # source marker T5 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Spa-Francorchamps Race Track — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/28/spa-francorchamps-race-track/
      accessed: 2026-05-29
    - title: Circuit de Spa-Francorchamps — Wikipedia
      url: https://en.wikipedia.org/wiki/Circuit_de_Spa-Francorchamps
      accessed: 2026-05-29
  - id: malmedy
    number: "7"
    name: Malmedy
    description: >-
      A quick right completing the Les Combes complex and feeding the downhill run toward Bruxelles; some guides count it as the third Les Combes element.
    direction: right
    position: { x: 0.744, y: 0.255 } # source marker T7 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Spa-Francorchamps Race Track — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/28/spa-francorchamps-race-track/
      accessed: 2026-05-29
    - title: Belgian GP Spa-Francorchamps Corner Names — total-motorsport.com
      url: https://www.total-motorsport.com/spa-francorchamps-corner-names-belgian-gp/
      accessed: 2026-05-29
  - id: bruxelles
    number: "8"
    name: Bruxelles
    description: >-
      A long, slow, downhill right-hand hairpin with a tightening radius, trail-braked deep; historically named Rivage.
    direction: right
    position: { x: 0.786, y: 0.276 } # source marker T8 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Spa-Francorchamps Race Track — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/28/spa-francorchamps-race-track/
      accessed: 2026-05-29
    - title: Belgian GP Spa-Francorchamps Corner Names — total-motorsport.com
      url: https://www.total-motorsport.com/spa-francorchamps-corner-names-belgian-gp/
      accessed: 2026-05-29
  - id: turn-9
    number: "9"
    name: Turn 9
    description: >-
      A medium-speed downhill left-hander with awkward camber on the run toward Pouhon; sometimes called Speaker's Corner, though the name is not consistently applied.
    direction: left
    position: { x: 0.840, y: 0.262 } # source marker T9 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Spa-Francorchamps Race Track — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/28/spa-francorchamps-race-track/
      accessed: 2026-05-29
  - id: pouhon
    number: "10-11"
    name: Pouhon
    description: >-
      A double-apex downhill left-hander in the forest section, taken at high speed with the second apex tightening on entry.
    direction: left
    apex_type: double
    landmark: >-
      Turn in at the first apex with the steering held; the second apex appears as the car settles, requiring a small steering correction without a lift.
    coaching: >-
      Treat the two apices as one long sweeper — too much wheel at the first apex scrubs the speed needed to carry the second. Brake-release timing matters more than the brake pedal here.
    position: { x: 0.945, y: 0.285 } # source marker T10 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Circuit de Spa-Francorchamps — Wikipedia
      url: https://en.wikipedia.org/wiki/Circuit_de_Spa-Francorchamps
      accessed: 2026-05-28
  - id: fagnes
    number: "12-13"
    name: Fagnes
    description: >-
      A fast right-left flick chicane through the forest section, sometimes called Piff-Paff.
    direction: right-left
    position: { x: 0.600, y: 0.437 } # source marker T12 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Spa-Francorchamps Race Track — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/28/spa-francorchamps-race-track/
      accessed: 2026-05-29
    - title: Circuit de Spa-Francorchamps — Wikipedia
      url: https://en.wikipedia.org/wiki/Circuit_de_Spa-Francorchamps
      accessed: 2026-05-29
  - id: stavelot
    number: "14-15"
    name: Stavelot
    description: >-
      A fast sweeping right (incorporating the Courbe Paul Frère) where exit speed onto the high-speed run toward Blanchimont is critical.
    direction: right
    position: { x: 0.798, y: 0.617 } # source marker T14 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Spa-Francorchamps Race Track — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/28/spa-francorchamps-race-track/
      accessed: 2026-05-29
    - title: Belgian GP Spa-Francorchamps Corner Names — total-motorsport.com
      url: https://www.total-motorsport.com/spa-francorchamps-corner-names-belgian-gp/
      accessed: 2026-05-29
  - id: blanchimont
    number: "17"
    name: Blanchimont
    description: >-
      A long, fast left-hand sweeper near the end of the lap, taken near flat in top gear with a narrow run-off backed by a steep drop behind the barriers.
    direction: left
    apex_type: geometric
    landmark: >-
      The braking marker on the right kerb sets the turn-in — the corner is faster than it looks, and lifting unsettles the rear into the bus-stop chicane that follows.
    coaching: >-
      One of the great commitment corners — a sustained high-speed load through a long arc, with minimal margin for error. Settle the car early and ride the throttle through.
    position: { x: 0.666, y: 0.576 } # source marker T17 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Circuit de Spa-Francorchamps — Wikipedia
      url: https://en.wikipedia.org/wiki/Circuit_de_Spa-Francorchamps
      accessed: 2026-05-28
  - id: bus-stop
    number: "18-19"
    name: Bus Stop Chicane
    description: >-
      The slow right-left chicane before the start-finish line — the final braking zone and primary overtaking point completing the lap.
    direction: chicane
    position: { x: 0.507, y: 0.518 } # source marker T18 (scripts/derive-corner-positions.mjs)
    sources:
    - title: Spa-Francorchamps Race Track — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/28/spa-francorchamps-race-track/
      accessed: 2026-05-29
    - title: Circuit de Spa-Francorchamps — Wikipedia
      url: https://en.wikipedia.org/wiki/Circuit_de_Spa-Francorchamps
      accessed: 2026-05-29
