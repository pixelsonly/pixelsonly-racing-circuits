# Circuit Record — validates against ../../schema/circuit.schema.json
# Authoring notes for contributors:
#   - Every fact should be traceable to an entry in `sources` (or a corner/lap_records
#     `sources` block). Use YAML comments to flag anything still needing a second source.
#   - Persist BOTH metric and imperial. The display unit per surface is a styling choice.
#   - `slug` must match this folder's name and never changes once published.

slug: monza
name: Autodromo Nazionale Monza
display_name: Monza
subtitle: Temple of Speed
country_code: IT
country_name: Italy
locality: Monza, Lombardy, Italy
latitude: 45.620556 # circuit center (45°37′14″N) — geohack via Wikipedia
longitude: 9.289444 # 9°17′22″E (EAST — positive)
year_opened: 1922
designer: Alfredo Rosselli
owner: Communes of Monza and Milan # operated by SIAS S.p.A.

primary_layout: grand-prix

layouts:
- id: grand-prix
  name: Grand Prix
  current: true
  years: 2000-present # current configuration following the 2000 rebuild of the first chicane
  direction: clockwise
  turns: 11
  length_km: 5.793
  length_mi: 3.600
  # elevation: Monza sits on the flat Lombardy plain; no authoritative source gives a
  # layout elevation figure, so both members of the pair are omitted rather than guessed.
  map_svg: map.svg
  corners:
  # Handedness cross-checked against two independent turn-by-turn guides (DIY Sim Studio,
  # Coach Dave Academy) which agree on every corner. The build stage re-checks against the
  # map geometry and geometry wins. The 11 turns group into 6 named complexes: three
  # chicanes (Rettifilo T1-2 right-left, Roggia T4-5 left-right, Ascari T8-10
  # left-right-left), Curva Grande (T3), the two Lesmos (T6, T7), and the Parabolica /
  # Curva Alboreto (T11). Official monzanet.it lists 7 right + 4 left = 11.
  # Per-corner positions are the source map's numbered turn markers (map-source.svg),
  # transformed into the map.svg viewBox via the affine that produced map.svg
  # (s≈0.66039, translate ≈ (-376.87, 50.50)); derived with scripts/derive-corner-positions.mjs
  # at 0.00px residual. Chicane entries are placed at the midpoint of their markers.
  # Geometry (signed turn) independently confirms Curva Grande / both Lesmos / Parabolica right,
  # and the Rettifilo (right-left) and Ascari (left-right-left) sequences.
  - id: variante-del-rettifilo
    number: "1-2"
    name: Variante del Rettifilo
    description: >-
      The first chicane, a tight right-left flick at the end of the long start/finish straight reached under heavy braking from near top speed; the prime overtaking and lock-up zone of the lap.
    direction: chicane
    position: { x: 0.386, y: 0.696 }
    sources:
    - title: Monza Circuit — Wikipedia
      url: https://en.wikipedia.org/wiki/Monza_Circuit
      accessed: 2026-06-11
    - title: Monza Circuit Guide — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/30/monza-circuit-guide/
      accessed: 2026-06-11
  - id: curva-grande
    number: "3"
    name: Curva Grande
    description: >-
      A long, sweeping right-hander taken at or near full throttle out of the first chicane, flowing at well over 250 km/h toward the Variante della Roggia.
    direction: right
    position: { x: 0.177, y: 0.709 }
    sources:
    - title: Monza Circuit Guide — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/30/monza-circuit-guide/
      accessed: 2026-06-11
    - title: Autodromo Nazionale Monza Track Guide — Coach Dave Academy
      url: https://coachdaveacademy.com/tutorials/autodromo-nazionale-monza-track-guide/
      accessed: 2026-06-11
  - id: variante-della-roggia
    number: "4-5"
    name: Variante della Roggia
    description: >-
      The second chicane, a tight left-right combination at the end of the Curva Grande run; with a slow corner feeding a long straight on either side it is one of the best overtaking opportunities on the lap.
    direction: chicane
    position: { x: 0.111, y: 0.461 }
    sources:
    - title: Monza Circuit Guide — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/30/monza-circuit-guide/
      accessed: 2026-06-11
    - title: Autodromo Nazionale Monza Track Guide — Coach Dave Academy
      url: https://coachdaveacademy.com/tutorials/autodromo-nazionale-monza-track-guide/
      accessed: 2026-06-11
  - id: lesmo-1
    number: "6"
    name: Curva di Lesmo 1
    description: >-
      The first of two quick right-handers named for the nearby village of Lesmo; a blind, medium-fast entry with gravel waiting on the exit to punish any car that runs wide.
    direction: right
    position: { x: 0.074, y: 0.334 }
    sources:
    - title: Monza Circuit Guide — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/30/monza-circuit-guide/
      accessed: 2026-06-11
    - title: Autodromo Nazionale Monza Track Guide — Coach Dave Academy
      url: https://coachdaveacademy.com/tutorials/autodromo-nazionale-monza-track-guide/
      accessed: 2026-06-11
  - id: lesmo-2
    number: "7"
    name: Curva di Lesmo 2
    description: >-
      The second Lesmo, a slightly tighter medium-speed right-hander that releases the cars down the back straight under the bridge toward the Variante Ascari.
    direction: right
    position: { x: 0.168, y: 0.313 }
    sources:
    - title: Monza Circuit Guide — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/30/monza-circuit-guide/
      accessed: 2026-06-11
    - title: Autodromo Nazionale Monza Track Guide — Coach Dave Academy
      url: https://coachdaveacademy.com/tutorials/autodromo-nazionale-monza-track-guide/
      accessed: 2026-06-11
  - id: variante-ascari
    number: "8-10"
    name: Variante Ascari
    signature: true
    description: >-
      A fast, flowing left-right-left triple chicane named for Alberto Ascari, taken at 170–190 km/h; a high-commitment sequence where a clean line through all three apexes sets up the long straight to the Parabolica.
    story: |
      The Variante Ascari is the rhythm test of the lap: a quick
      left-right-left chicane carried at far higher speed than the slower
      first two variants, demanding the front and rear stay settled across
      three direction changes. A mistake at the entry compromises the whole
      sequence and the long straight that follows, so it is one of the most
      lap-time-critical sections at Monza. It is named for Alberto Ascari,
      the two-time world champion killed testing at Monza in 1955.
    direction: chicane
    position: { x: 0.498, y: 0.576 }
    sources:
    - title: Monza Circuit Guide — DIY Sim Studio
      url: https://www.diysimstudio.com/2024/08/30/monza-circuit-guide/
      accessed: 2026-06-11
    - title: Autodromo Nazionale Monza Track Guide — Coach Dave Academy
      url: https://coachdaveacademy.com/tutorials/autodromo-nazionale-monza-track-guide/
      accessed: 2026-06-11
  - id: parabolica
    number: "11"
    name: Curva Alboreto (Parabolica)
    signature: true
    description: >-
      The long, constant-radius right-hander that closes the lap, opening in radius onto the start/finish straight so that exit speed sets up the whole pit straight. Officially renamed Curva Alboreto in 2021 in honour of Michele Alboreto.
    story: |
      The Parabolica is Monza's defining corner: a sweeping 180-degree right
      where the line is everything, a smooth, early throttle application
      trading entry speed for a maximum exit onto the long start/finish
      straight. In September 2021 the Automobile Club d'Italia renamed it
      Curva Alboreto in honour of Milanese driver Michele Alboreto, marking
      twenty years since his death; both names remain in common use.
    direction: right
    position: { x: 0.947, y: 0.653 }
    sources:
    - title: Monza Circuit — Wikipedia
      url: https://en.wikipedia.org/wiki/Monza_Circuit
      accessed: 2026-06-11
    - title: Monza renames Parabolica in honour of Michele Alboreto — Formula 1
      url: https://www.formula1.com/en/latest/article/monza-to-rename-the-parabolica-in-honour-of-michele-alboreto-during-italian.2DPL2VOdDU8nM7Ik0pJDKJ
      accessed: 2026-06-11
  lap_records:
  - class: F1
    time: "1:20.901"
    driver: Lando Norris
    team: McLaren
    car: McLaren MCL39
    year: 2025
    record_type: race
    sources:
    - title: Monza Circuit — Wikipedia (lap records)
      url: https://en.wikipedia.org/wiki/Monza_Circuit
      accessed: 2026-06-11

