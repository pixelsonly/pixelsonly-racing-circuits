      accessed: 2026-05-29
  - id: adenauer-forst
    name: Adenauer Forst
    description: >-
      A slow right into a left-right sequence in the forest; an abrupt line change that catches many drivers out.
    direction: right-left
    # position: pending — fill once map.svg viewBox is finalized (intake step 5C)
    sources:
