  # No numbered turn markers exist on the source map, so positions stay pending.
  - id: hatzenbach
    name: Hatzenbach
    description: >-
      A tight, flowing sequence of alternating left and right corners that opens the Nordschleife after the link from the GP circuit.
    direction: left-right
    # position: pending — fill once map.svg viewBox is finalized (intake step 5C)
    sources:
