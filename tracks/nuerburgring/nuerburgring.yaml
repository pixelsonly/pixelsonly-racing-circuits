  - id: bruennchen
    name: Brünnchen
    description: >-
      A famous pair of right-handers, the second blind and uphill; the best-known spectator and incident spot on tourist days.
    direction: right
    # position: pending — fill once map.svg viewBox is finalized (intake step 5C)
