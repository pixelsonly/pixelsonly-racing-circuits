editorial:
  tagline: >-
    A 2.54-mile rollercoaster through the Georgia pines — fast downhill esses, a mile-long back straight, and the blind, plunging dive of Turn 12 onto the front straight.
  narrative_md: road-atlanta.md
  available_in:
  - iRacing
  - Automobilista 2

