editorial:
  tagline: >-
    Thirteen and a half kilometres of racetrack and closed-off public road through the Sarthe countryside: home of the 24 Hours of Le Mans, defined by the 6 km Mulsanne Straight and the flat-out commitment of the Porsche Curves.
  narrative_md: le-mans.md
  available_in:
  - iRacing
  - Le Mans Ultimate
  - Gran Turismo 7
  - Forza Motorsport

