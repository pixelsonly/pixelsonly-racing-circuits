  tagline: >-
    A 3.27-mile rollercoaster through the Virginia hills: the Climbing Esses, the ghost of the Oak Tree and a lap of blind crests that has earned VIR a place among America's great road courses.
  narrative_md: vir.md
  available_in:
  - iRacing

