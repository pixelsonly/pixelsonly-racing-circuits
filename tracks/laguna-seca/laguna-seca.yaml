#   - `slug` must match this folder's name and never changes once published.

slug: laguna-seca
name: WeatherTech Raceway Laguna Seca
display_name: Laguna Seca
subtitle: Raceway
country_code: US
country_name: United States
locality: Salinas, California, USA
latitude: 36.5847 # circuit center — confirm exact value against an authoritative source during intake
longitude: -121.753
year_opened: 1957

primary_layout: grand-prix

layouts:
- id: grand-prix
  name: Grand Prix
  current: true
  years: 1988-present # current 11-turn configuration; the Corkscrew dates to the original 1957 layout
  direction: clockwise
  turns: 11
  length_km: 3.602
  length_mi: 2.238
  elevation_change_m: 55
  elevation_change_ft: 180
  map_svg: map.svg
  corners:
  - id: corkscrew
    number: "8-8A"
    name: The Corkscrew
    signature: true
    description: >-
      A blind, downhill left-right plunge over Turns 8 and 8A, dropping roughly 18 m (59 ft) across a short distance with a blind crest and apex on the uphill approach.
    story: |
      Widely regarded as one of the most challenging corners in motorsport.
      The 1996 pass by Alex Zanardi around the outside of Bryan Herta on the
      final lap is among its most famous moments.
    # position: { x: 0.00, y: 0.00 }  # add when the map.svg viewBox is finalized
    sources:
    - title: Laguna Seca — Wikipedia
      url: https://en.wikipedia.org/wiki/Laguna_Seca
      accessed: 2026-05-27
  lap_records: []
    # Shape for when records are added (each entry REQUIRES sources):
    # - class: IMSA GTP
    #   time: "1:05.786"
    #   driver: ""
    #   team: ""
    #   car: ""
    #   year: 2024
    #   record_type: race
    #   sources:
    #     - title: ""
    #       url: ""
    #       accessed: "2026-05-27"

editorial:
  tagline: >-
    A 3.6-kilometer circuit carved into the Monterey hills, defined by the blind plunge of the Corkscrew.
  narrative_md: laguna-seca.md
  available_in:
  - iRacing
  - Assetto Corsa Competizione
  - Gran Turismo 7

